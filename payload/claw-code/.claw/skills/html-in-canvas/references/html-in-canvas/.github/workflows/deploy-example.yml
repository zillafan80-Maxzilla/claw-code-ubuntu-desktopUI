name: Deploy WICG Pages & WebGPU Example

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - working-directory: ./Examples/webgpu-jelly-slider
        run: |
          npm install
          npm run build
          rm -rf node_modules

      - uses: actions/configure-pages@v4

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # Take ownership of the folder from Docker's root user, then copy!
      - run: |
          sudo chown -R runner ./_site
          cp -R ./Examples/webgpu-jelly-slider/dist/* ./_site/Examples/webgpu-jelly-slider/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - id: deployment
        uses: actions/deploy-pages@v4
